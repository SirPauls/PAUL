name: Deploy to CloudPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --delete
          path: dist/
          remote_path: ~/htdocs/paul.sirpauls.com/public
          remote_host: ${{ secrets.CLOUDPANEL_HOST }}
          remote_port: ${{ secrets.CLOUDPANEL_PORT }}
          remote_user: ${{ secrets.CLOUDPANEL_USER }}
          remote_key: ${{ secrets.CLOUDPANEL_SSH_KEY }}
